name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to write the GitHub release
      packages: write # needed to push to GHCR
      id-token: write # needed for keyless cosign signing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      # QEMU + buildx for the multi-arch Docker images. Tarballs are
      # cross-built natively by goreleaser; only the docker steps need this.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # cosign signs the checksum blob and every pushed manifest; syft
      # generates the CycloneDX SBOMs. Both are driven by .goreleaser.yaml.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      # GHCR login uses the workflow's own GITHUB_TOKEN; nothing extra
      # required as long as `permissions.packages: write` is set above.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
