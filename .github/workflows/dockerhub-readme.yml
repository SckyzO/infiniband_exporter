# Syncs docker/README.md to the Docker Hub repository description.
#
# Triggers:
#   - push to main that touches docker/README.md (or this workflow itself)
#   - every published release
#   - manual dispatch from the Actions UI
#
# GHCR doesn't need this — it reads org.opencontainers.image.description from
# the image labels, which GoReleaser sets at build time.
#
# Required secrets:
#   DOCKER_USERNAME    Docker Hub login
#   DOCKER_TOKEN       Docker Hub access token with "Read & Write" scope
#                      (the same token used for image push works here).

name: Sync Docker Hub README

on:
  push:
    branches: [main]
    paths:
      - 'docker/README.md'
      - '.github/workflows/dockerhub-readme.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: sckyzo/infiniband-exporter
          short-description: "Prometheus exporter for InfiniBand fabrics"
          readme-filepath: ./docker/README.md
