version: "2"

run:
  timeout: 5m
  go: "1.26"

linters:
  # Baseline set for v0.12.0. The wider set (gocritic, prealloc, unparam,
  # gosec, revive) is intentionally deferred until 0.13+ once the legacy
  # debt has been addressed.
  default: standard
  # errcheck is enabled from v0.13.0 onward. Wider quality set
  # (gocritic, prealloc, unparam, gosec, revive) lands progressively
  # in 0.14+ once the legacy debt has been cleaned up.
  enable:
    - misspell
    - unconvert
  settings:
    errcheck:
      exclude-functions:
        # http.ResponseWriter.Write: cannot recover meaningfully if the
        # client disconnects mid-write; logging would be noise.
        - (net/http.ResponseWriter).Write
        # bytes.Buffer.Write{,String} only fail on out-of-memory, which
        # the runtime panics on anyway — the documented Buffer contract
        # is "always returns nil error".
        - (*bytes.Buffer).Write
        - (*bytes.Buffer).WriteString
        # go-kit log: errors here are non-actionable (we are already
        # logging an error) and would create infinite loops if we tried
        # to log the log error.
        - (github.com/go-kit/log.Logger).Log
        # The cancel function returned by context.WithTimeout never
        # surfaces an error; calling it discards a no-op return.
        - cancel
    staticcheck:
      # QF* (quickfix), ST1000 (package comments), ST1003 (Go naming),
      # ST1005 (lower-cased error strings) are stylistic — tracked for
      # 0.14+. They do not represent latent defects.
      checks:
        - all
        - -QF1003
        - -ST1000
        - -ST1003
        - -ST1005

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/SckyzO/infiniband_exporter

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
