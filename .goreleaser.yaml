version: 2

project_name: infiniband_exporter

before:
  hooks:
    - go mod tidy

builds:
  - id: infiniband_exporter
    main: .
    binary: infiniband_exporter
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/prometheus/common/version.Version={{ .Version }}
      - -X github.com/prometheus/common/version.Revision={{ .Commit }}
      - -X github.com/prometheus/common/version.Branch={{ .Branch }}
      - -X github.com/prometheus/common/version.BuildUser=goreleaser
      - -X github.com/prometheus/common/version.BuildDate={{ .Date }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - ppc64le
      - s390x

archives:
  - id: infiniband_exporter
    formats:
      - tar.gz
    name_template: '{{ .ProjectName }}-{{ .Version }}.{{ .Os }}-{{ .Arch }}'
    files:
      - LICENSE
      - CHANGELOG.md
      - README.md

checksum:
  name_template: '{{ .ProjectName }}-{{ .Version }}.checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ .Version }}-snapshot-{{ .ShortCommit }}'

# Supply-chain artefacts, produced and verifiable on every release:
#   1. SBOM (CycloneDX) per archive — what's inside each tarball.
#   2. Cosign signature on the checksum file — proves the release artefacts
#      weren't tampered with after build.
#   3. Cosign signatures on every Docker manifest — see docker_signs below.
# All signatures are keyless via Sigstore: the signing identity is the GitHub
# Actions workflow itself, attested by the runner's OIDC token. Consumers
# verify with `cosign verify <image>` (see docker/README.md).
sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--yes'
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    artifacts: manifests
    output: true
    args:
      - sign
      - '--yes'
      - '${artifact}@${digest}'

# Container images. Single variant (the image bundles infiniband-diags +
# ibswinfo.sh — there is no "minimal" flavour). Pushed as a multi-arch
# manifest (linux/amd64 + linux/arm64) to GHCR and Docker Hub on every tag.
#
# infiniband-diags is only packaged for amd64 and arm64 on Debian, so the
# images cover those two arches; the tarball still covers all four including
# ppc64le and s390x.
#
# Floating tags (latest, X.Y, X) are skipped on pre-release tags (vX.Y.Z-rc1)
# so they always point at a stable release.
dockers_v2:
  - id: standard
    dockerfile: Dockerfile
    images:
      - "ghcr.io/sckyzo/infiniband_exporter"
      - "docker.io/sckyzo/infiniband-exporter"
    tags:
      - "{{ .Version }}"
      - '{{ if eq .Prerelease "" }}{{ .Major }}.{{ .Minor }}{{ end }}'
      - '{{ if eq .Prerelease "" }}{{ .Major }}{{ end }}'
      - '{{ if eq .Prerelease "" }}latest{{ end }}'
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: "true"
    labels:
      "org.opencontainers.image.title": "infiniband_exporter"
      "org.opencontainers.image.description": "Prometheus exporter for InfiniBand fabrics"
      "org.opencontainers.image.licenses": "Apache-2.0"
      "org.opencontainers.image.source": "https://github.com/SckyzO/infiniband_exporter"
      "org.opencontainers.image.documentation": "https://github.com/SckyzO/infiniband_exporter/blob/main/docker/README.md"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
    build_args:
      VERSION: "{{ .Version }}"
      COMMIT: "{{ .FullCommit }}"
      BUILD_DATE: "{{ .Date }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'Merge pull request'
      - 'Merge branch'
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Refactor
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: Other
      order: 999

release:
  github:
    owner: SckyzO
    name: infiniband_exporter
  draft: false
  prerelease: auto
  mode: append
