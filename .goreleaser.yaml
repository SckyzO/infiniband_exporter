version: 2

project_name: infiniband_exporter

before:
  hooks:
    - go mod tidy

builds:
  - id: infiniband_exporter
    main: .
    binary: infiniband_exporter
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/prometheus/common/version.Version={{ .Version }}
      - -X github.com/prometheus/common/version.Revision={{ .Commit }}
      - -X github.com/prometheus/common/version.Branch={{ .Branch }}
      - -X github.com/prometheus/common/version.BuildUser=goreleaser
      - -X github.com/prometheus/common/version.BuildDate={{ .Date }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - ppc64le
      - s390x

archives:
  - id: infiniband_exporter
    formats:
      - tar.gz
    name_template: '{{ .ProjectName }}-{{ .Version }}.{{ .Os }}-{{ .Arch }}'
    files:
      - LICENSE
      - CHANGELOG.md
      - README.md

checksum:
  name_template: '{{ .ProjectName }}-{{ .Version }}.checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ .Version }}-snapshot-{{ .ShortCommit }}'

# Container images. Pushed to GitHub Container Registry on every tag.
# infiniband-diags is only packaged for amd64 and arm64 on Debian, so
# the Docker images cover those two architectures (the tarball still
# covers all four including ppc64le and s390x).
dockers:
  - image_templates:
      - "ghcr.io/sckyzo/infiniband_exporter:{{ .Version }}-amd64"
      - "ghcr.io/sckyzo/infiniband_exporter:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: amd64
    extra_files:
      - LICENSE
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
  - image_templates:
      - "ghcr.io/sckyzo/infiniband_exporter:{{ .Version }}-arm64"
      - "ghcr.io/sckyzo/infiniband_exporter:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: arm64
    extra_files:
      - LICENSE
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"

docker_manifests:
  - name_template: "ghcr.io/sckyzo/infiniband_exporter:{{ .Version }}"
    image_templates:
      - "ghcr.io/sckyzo/infiniband_exporter:{{ .Version }}-amd64"
      - "ghcr.io/sckyzo/infiniband_exporter:{{ .Version }}-arm64"
  - name_template: "ghcr.io/sckyzo/infiniband_exporter:latest"
    image_templates:
      - "ghcr.io/sckyzo/infiniband_exporter:latest-amd64"
      - "ghcr.io/sckyzo/infiniband_exporter:latest-arm64"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'Merge pull request'
      - 'Merge branch'
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Refactor
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: Other
      order: 999

release:
  github:
    owner: SckyzO
    name: infiniband_exporter
  draft: false
  prerelease: auto
  mode: append
